<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Docs Site</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body style="--accent: #4f46e5">
  <main>
    <header>
      <p class="eyebrow">Developer utilities / public</p>
      <h1>Docs Site</h1>
      <p>A minimal documentation starter.</p>
    </header>

    <section class="panel">
      <h2>Project Idea</h2>
      <p>Write project docs as static pages.</p>
      <div class="actions">
        <button id="add">Add sample card</button>
        <button id="clear">Reset</button>
      </div>
    </section>

    <section class="grid" id="cards" aria-live="polite"></section>
  </main>
  <script src="app.js"></script>
</body>
</html>
